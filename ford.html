<!doctype html>
<html lang="fr" data-theme="dark">
<head>
<link rel="icon" type="image/svg+xml" href="./kent-logo.svg">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Espace Ford</title>
  <script src="./shared-ui.js"></script>

<script>
(function(){
  try{
    const t = localStorage.getItem("APP_THEME") || "dark";
    document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
  }catch(e){
    document.documentElement.setAttribute("data-theme","dark");
  }
})();
</script>

<style>
:root{
  --bg:#0b0f17;
  --stroke:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.6);
}
html[data-theme="light"]{
  --bg:#f6f7fb;
  --stroke:rgba(0,0,0,0.10);
  --text:rgba(10,14,22,0.92);
  --muted:rgba(10,14,22,0.58);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(900px 600px at 20% -10%, rgba(90,140,255,0.15), transparent 60%),
    radial-gradient(900px 600px at 100% 20%, rgba(255,120,200,0.10), transparent 55%),
    var(--bg);
  color:var(--text);
}

/* NAVBAR */
.navbar{
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 18px;
  border-bottom:1px solid var(--stroke);
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}
.brand{display:flex;align-items:center;gap:12px;}
.hubSquare{
  width:42px;height:42px;border-radius:16px;
  background: linear-gradient(135deg,#7c3aed,#22c55e);
  cursor:pointer;
}
.titleWrap{cursor:pointer;}
.titleWrap b{font-weight:1000;font-size:14px;}
.titleWrap span{font-size:12px;color:var(--muted);}
.navBtns{display:flex;gap:10px;}
.btn{
  height:38px;padding:0 16px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:var(--text);font-weight:900;
  text-decoration:none;display:flex;align-items:center;
  transition:.15s;
}
.btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-1px);}
.btn.primary{
  background:linear-gradient(135deg,#7fb3ff55,#ff7ad955);
}

/* CENTER */
.center{
  height:calc(100vh - 64px);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.card{
  width:min(1200px,100%);
  text-align:center;
}
.imageCard{
  margin:0 auto 20px;
  width:min(1050px,100%);
  height:420px;
  display:flex;align-items:center;justify-content:center;
  border-radius:22px;
  overflow:hidden;
  border:none;
  box-shadow:none;
  background:transparent;
}
.imageCard img{
  width:100%;height:100%;
  object-fit:contain;
}
.title{font-size:30px;font-weight:1000;margin:0 0 8px;}
.subtitle{color:var(--muted);}

@media(max-width:820px){.imageCard{height:300px;}}
@media(max-width:520px){.imageCard{height:220px;}}
</style>
</head>

<body>

<div class="navbar">
  <div class="brand">
    <div class="hubSquare" id="goHub"></div>
    <div class="titleWrap" id="goHub2">
      <b>Espace Ford</b>
      <span>Accès rapide aux outils Ford</span>
    </div>
  </div>

  <div class="navBtns">
    <a class="btn primary" href="client-ford.html">Outil Lookup</a>
    <a class="btn" href="explorer-ford.html">Recherche Produit</a>
  </div>
</div>

<div class="center">
  <div class="card">
    <div class="imageCard">
      <img src="accford.png" alt="Espace Ford">
    </div>
    <h1 class="title">Espace Ford</h1>
  
  </div>
</div>

<script>
(function(){
  const go=()=>window.location.href="index.html";
  document.getElementById("goHub").onclick=go;
  document.getElementById("goHub2").onclick=go;
})();
</script>

</body>
</html>
