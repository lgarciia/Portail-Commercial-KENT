<!doctype html>
<html lang="fr">
<head>
  <link rel="icon" type="image/svg+xml" href="./kent-logo.svg">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Evol Reporting</title>

  <style>
    :root{
      --bg:#0b0f17;
      --panel:rgba(255,255,255,0.06);
      --panel2:rgba(255,255,255,0.045);
      --stroke:rgba(255,255,255,0.10);
      --stroke2:rgba(255,255,255,0.14);
      --text:rgba(255,255,255,0.90);
      --muted:rgba(255,255,255,0.62);
      --muted2:rgba(255,255,255,0.46);
      --accent:rgba(132,182,255,0.95);
      --good:rgba(95,255,160,0.92);
      --bad:rgba(255,110,110,0.92);
      --warn:rgba(255,199,97,0.92);
      --shadow:0 16px 40px rgba(0,0,0,0.35);
      --radius:16px;
      --cellH:34px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(90,140,255,0.15), transparent 60%),
        radial-gradient(1100px 800px at 110% 20%, rgba(255,120,200,0.10), transparent 55%),
        radial-gradient(900px 700px at 60% 110%, rgba(130,255,200,0.08), transparent 55%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .app{height:100%;display:flex;flex-direction:column}

    /* ===== TOPBAR (homogène screen) ===== */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 18px;
      border-bottom:1px solid rgba(255,255,255,0.10);
      background: linear-gradient(to bottom, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:420px}
    .logo{
      width:38px;height:38px;border-radius:14px;
      background: linear-gradient(135deg, rgba(132,182,255,0.95), rgba(120,255,195,0.55));
      box-shadow: 0 10px 22px rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.15);
      flex:0 0 auto;
    }
    .titleWrap{display:flex;flex-direction:column;line-height:1.15}
    .title{
      font-weight:800;           /* ✅ pas ultra lourd */
      letter-spacing:.2px;
      font-size:16px;
      margin:0;
    }
    .subtitle{
      font-size:13px;
      color:rgba(255,255,255,0.62);
      font-weight:500;           /* ✅ PAS en gras comme ton screen */
      margin-top:2px;
    }

    .btn{
      height:38px;
      padding:0 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.90);
      font-weight:700;
      cursor:pointer;
      transition:.12s;
    }
    .btn:hover{background:rgba(255,255,255,0.10);transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn.primary{
      background:rgba(132,182,255,0.18);
      border-color:rgba(132,182,255,0.28);
    }
    .btn.ghost{background:rgba(255,255,255,0.04)}

    .shell{
      height: calc(100% - 67px);
      padding:16px 16px 18px;
      display:grid;
      grid-template-rows: auto auto 1fr;
      gap:12px;
      min-height:0;
    }

    .card{
      border:1px solid rgba(255,255,255,0.10);
      background: linear-gradient(to bottom, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(12px);
      overflow:hidden;
      min-height:0;
    }

    /* ===== STATUS pills (style screen) ===== */
    .status{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,0.10);
      background:rgba(0,0,0,0.14);
    }
    .chips{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .chip{
      display:inline-flex;align-items:center;gap:10px;
      height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      font-size:13px;
      font-weight:500;           /* ✅ texte normal */
      color:rgba(255,255,255,0.70);
    }
    .chip b{
      font-weight:700;           /* ✅ juste un peu + pour la valeur */
      color:rgba(255,255,255,0.90);
    }
    .dot{width:9px;height:9px;border-radius:999px;background:rgba(255,255,255,0.28)}
    .dot.ok{background:var(--good)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    /* ===== FILTERS ===== */
    .filters{
      padding:12px;
      display:grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap:12px;
      /* ✅ tu voulais remettre du scroll : on autorise si besoin */
      overflow:auto;
      max-height: 340px; /* compact comme ton app */
    }

    .fcol{
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(0,0,0,0.16);
      border-radius:16px;
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height: 280px;
    }

    .fhead{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .ftitle{
      font-weight:800;
      letter-spacing:.35px;
      color:rgba(255,255,255,0.62);
      text-transform:uppercase;
      font-size:12px;
    }
    .pill{
      height:30px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      font-weight:600;           /* ✅ léger */
      color:rgba(255,255,255,0.82);
      display:inline-flex;
      align-items:center;
      user-select:none;
      font-size:12px;
    }

    .btnStack{display:flex;flex-direction:column;gap:8px}
    .btnSm{
      height:34px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:rgba(255,255,255,0.86);
      font-weight:700;
      cursor:pointer;
      transition:.12s;
      font-size:12px;
    }
    .btnSm:hover{background:rgba(255,255,255,0.09)}

    .search{
      height:34px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:rgba(255,255,255,0.92);
      padding:0 10px;
      outline:none;
      font-weight:600;
      font-size:12px;
    }
    .search::placeholder{color:rgba(255,255,255,0.45)}

    /* ✅ scrollbar OK pour les listes (clients etc.) */
    .list{
      flex:1;
      min-height:0;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(0,0,0,0.14);
      border-radius:14px;
      overflow:auto;
      padding:6px;
    }

    .item{
      height:34px;
      border-radius:10px;
      border:1px solid transparent;
      background:rgba(255,255,255,0.03);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 10px;
      gap:10px;
      cursor:pointer;
      user-select:none;
      transition:.12s;
      margin:6px 0;
      font-size:12px;
    }
    .item:hover{background:rgba(255,255,255,0.07)}
    .item.on{
      background:rgba(132,182,255,0.14);
      border-color:rgba(132,182,255,0.26);
    }
    .item .l{font-weight:700;color:rgba(255,255,255,0.88)}
    .item .r{font-weight:700;color:rgba(255,255,255,0.55)}

    .ffoot{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      padding-top:2px;
      color:rgba(255,255,255,0.58);
      font-weight:500;           /* ✅ pas gras */
      font-size:11px;
    }

    /* ===== RESULTS ===== */
    .results{
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .resultsTop{
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,0.10);
      background:rgba(0,0,0,0.12);
    }

    .kpis{display:flex;gap:12px;flex-wrap:wrap}
    .kpi{
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(0,0,0,0.16);
      border-radius:14px;
      padding:8px 12px;
      min-width:170px;
    }
    .kpi .k{font-size:10px;color:rgba(255,255,255,0.58);font-weight:600;letter-spacing:.2px}
    .kpi .v{margin-top:4px;font-size:14px;font-weight:800}

    .tableWrap{
      flex:1;
      min-height:0;
      overflow:auto;
      background:rgba(0,0,0,0.10);
    }

    table{
      border-collapse:separate;
      border-spacing:0;
      width:max-content;
      min-width:100%;
      font-size:12px;
    }

    thead th{
      position:sticky;
      top:0;
      z-index:3;
      background:rgba(10,15,23,0.92);
      backdrop-filter: blur(8px);
      border-bottom:1px solid rgba(255,255,255,0.10);
      font-weight:700;
      color:rgba(255,255,255,0.84);
      text-align:center;
    }

    th,td{
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,0.08);
      border-right:1px solid rgba(255,255,255,0.08);
      white-space:nowrap;
      height: var(--cellH);
    }

    /* sticky left cols */
    .col-client{
      position:sticky;
      left:0;
      z-index:4;
      background:rgba(10,15,23,0.96);
      border-right:1px solid rgba(255,255,255,0.12);
      min-width:240px;
      max-width:320px;
      font-weight:800;
      text-align:left;
    }
    .col-nclient{
      position:sticky;
      left:240px;
      z-index:4;
      background:rgba(10,15,23,0.96);
      border-right:1px solid rgba(255,255,255,0.12);
      min-width:110px;
      text-align:center;
      color:rgba(255,255,255,0.72);
      font-weight:700;
    }
    tbody .col-client, tbody .col-nclient{ z-index:2; }

    td.num, th.num{ text-align:right; font-variant-numeric:tabular-nums; font-weight:700; }

    .rowTotal td{
      background:rgba(132,182,255,0.08);
      font-weight:800;
      border-bottom:1px solid rgba(132,182,255,0.18);
    }

    .ecart.pos{ color:var(--good); }
    .ecart.neg{ color:var(--bad); }
    .ecart.zero{ color:rgba(255,255,255,0.55); }

    /* month group separators */
    .mStart{ border-left:3px solid rgba(255,255,255,0.22) !important; }
    .subSep{ border-left:2px solid rgba(255,255,255,0.12) !important; }

    @media (max-width:1200px){
      .filters{grid-template-columns: repeat(2, minmax(240px, 1fr));max-height: 360px;}
      body{overflow:auto;}
    }


    /* ✅ mini bouton semaine (discret) dans l'entête des mois */
.wkBtn{
  height:24px;
  min-width:24px;
  padding:0 8px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.86);
  font-weight:800;
  font-size:11px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-left:8px;
  opacity:.75;
  transition:.12s;
}
.wkBtn:hover{ opacity:1; background: rgba(255,255,255,0.10); transform: translateY(-1px); }
.wkBtn:active{ transform: translateY(0px); }
.wkBtn .ic{ font-size:12px; line-height:1; }
.wkBtn .tx{ font-size:11px; letter-spacing:.1px; }


/* ✅ bouton semaine discret dans la cellule MOIS */
.moCell{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.wkMini{
  height:22px;
  padding:0 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.14);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.86);
  font-weight:800;
  font-size:11px;
  cursor:pointer;
  opacity:.70;
  transition:.12s;
  white-space:nowrap;
}
.wkMini:hover{ opacity:1; background: rgba(255,255,255,0.10); transform: translateY(-1px); }
.wkMini:active{ transform: translateY(0px); }



  </style>

</head>

<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="titleWrap">
        <div class="title">Evol Reporting</div>
        <div class="subtitle">Sélection multi-mois</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
      <button class="btn ghost" id="btnReset">Reset filtres</button>
      <button class="btn primary" id="btnGenerate">Générer</button>
      <button class="btn" id="btnExportCsv">Exporter CSV</button>
    </div>
  </div>

  <div class="shell">
    <div class="card">
      <div class="status">
        <div class="chips">
          <div class="chip"><span class="dot" id="dotBudget"></span>Budget : <b id="sBudget">—</b></div>
          <div class="chip"><span class="dot" id="dotReel"></span>Réel PSA : <b id="sReel">—</b></div>
          <div class="chip"><span class="dot ok"></span>Vue : <b>Mois en colonnes</b></div>
        </div>
        <div class="chip"><span class="dot ok"></span>Astuce : filtre “MOIS” = colonnes affichées</div>
      </div>

      <div class="filters" id="filtersGrid"></div>
    </div>

    <div class="card results">
      <div class="resultsTop">
        <div class="kpis">
          <div class="kpi"><div class="k">Clients</div><div class="v" id="kClients">—</div></div>
          <div class="kpi"><div class="k">Cumul Réel</div><div class="v" id="kReal">—</div></div>
          <div class="kpi"><div class="k">Cumul Budget</div><div class="v" id="kBudget2">—</div></div>
          <div class="kpi"><div class="k">Cumul Écart</div><div class="v" id="kEcart">—</div></div>
        </div>
      </div>

      <div class="tableWrap">
        <table id="resultTable"></table>
      </div>
    </div>
  </div>
</div>

<script>


// ✅ CONFIG VUE SEMAINE (à changer pour Ford/Gueudet/Direct)
const WEEK_VIEW_PAGE = "vue_semaine.html";
const ENTITY_KEY     = "PSA";
const REAL_XLSX_FILE = "activitereelpsa.xlsx";
const REAL_DATE_COL  = "Date vente";
(function(){
  // ---------------------------
  // CONFIG PSA (localStorage keys)
  // ---------------------------
  const STORAGE = {
    budget: "BUDGET2026_DATA_PSA_V1",
    activiteReel: "ACTIVITEREEL_PSA_V1",
    realOverride: "BUDGET2026_REAL_PSA_V1" // optionnel
  };

  const MONTHS = [
    { key:"jan", label:"Janvier" },
    { key:"feb", label:"Février" },
    { key:"mar", label:"Mars" },
    { key:"apr", label:"Avril" },
    { key:"may", label:"Mai" },
    { key:"jun", label:"Juin" },
    { key:"jul", label:"Juillet" },
    { key:"aug", label:"Août" },
    { key:"sep", label:"Septembre" },
    { key:"oct", label:"Octobre" },
    { key:"nov", label:"Novembre" },
    { key:"dec", label:"Décembre" },
  ];

  const nf0 = new Intl.NumberFormat("fr-FR", { minimumFractionDigits:0, maximumFractionDigits:0 });
// ===========================
// CONFIG VUE SEMAINE (COPY/PASTE FRIENDLY)
// ===========================
// 👉 pour dupliquer sur Ford/Gueudet/Direct : tu changes ces 4 lignes
const WEEK_VIEW_PAGE = "vue_semaine.html";     // nom du fichier de la page semaine
const REAL_XLSX_FILE = "activitereelpsa.xlsx"; // ⚠️ mets ici TON fichier réel de l'entité (ex: activitereelford.xlsx)
const ENTITY_KEY = "PSA";                      // "PSA" / "FORD" / "GUEUDET" / "DIRECT"
const REAL_DATE_COL = "Date vente";            // nom colonne date dans le réel (tolérance accents/casse)
  // ---------------------------
  // DOM
  // ---------------------------
  const el = {
    dotBudget: document.getElementById("dotBudget"),
    dotReel: document.getElementById("dotReel"),
    sBudget: document.getElementById("sBudget"),
    sReel: document.getElementById("sReel"),

    btnReset: document.getElementById("btnReset"),
    btnGenerate: document.getElementById("btnGenerate"),
    btnExportCsv: document.getElementById("btnExportCsv"),

    filtersGrid: document.getElementById("filtersGrid"),
    resultTable: document.getElementById("resultTable"),

    kClients: document.getElementById("kClients"),
    kReal: document.getElementById("kReal"),
    kBudget2: document.getElementById("kBudget2"),
    kEcart: document.getElementById("kEcart"),
  };

  // ---------------------------
  // LOAD DATA
  // ---------------------------
  const budgetData = loadJSON(STORAGE.budget, null);     // {clients:[{id,name,nclient,budget:{jan..dec}}]}
  const activite = loadJSON(STORAGE.activiteReel, null); // {clients:[{nclient,name,months:{jan..dec}}]}
  let override = loadJSON(STORAGE.realOverride, {});
  if (!override || typeof override !== "object") override = {};

  // index activité réelle
  const actByNClient = new Map();
  const actByName = new Map();
  if (activite?.clients?.length){
    for (const c of activite.clients){
      const nc = normKey(c.nclient);
      const nm = normKey(c.name);
      if (nc) actByNClient.set(nc, c);
      if (nm) actByName.set(nm, c);
    }
  }

  paintStatus();

  // ---------------------------
  // FILTERS SETUP
  // ---------------------------
  const dimensions = [
    { key:"ANNEE", label:"ANNÉE" },
    { key:"MOIS", label:"MOIS" },
    { key:"CLIENT", label:"CLIENTS" },
    { key:"NCLIENT", label:"N CLIENT" },
  ];

  const values = {
    ANNEE: ["2026"],
    MOIS: MONTHS.map(m=>m.label),
    CLIENT: (budgetData?.clients || []).map(c => c.name || "").filter(Boolean).sort((a,b)=>a.localeCompare(b, "fr")),
    NCLIENT: (budgetData?.clients || []).map(c => String(c.nclient || "").trim()).filter(Boolean).sort((a,b)=>a.localeCompare(b, "fr")),
  };

  const filters = {
    ANNEE: new Set(values.ANNEE),
    MOIS: new Set(values.MOIS),
    CLIENT: new Set(values.CLIENT),
    NCLIENT: new Set(values.NCLIENT),
  };

  const searches = { ANNEE:"", MOIS:"", CLIENT:"", NCLIENT:"" };
  let lastExportRows = [];

  buildFiltersUI();
  renderAllLists();
  generate();

  el.btnReset.addEventListener("click", ()=>{
    filters.ANNEE = new Set(values.ANNEE);
    filters.MOIS = new Set(values.MOIS);
    filters.CLIENT = new Set(values.CLIENT);
    filters.NCLIENT = new Set(values.NCLIENT);
    searches.ANNEE = searches.MOIS = searches.CLIENT = searches.NCLIENT = "";
    el.filtersGrid.querySelectorAll("input[data-search]").forEach(i=>i.value="");
    renderAllLists();
    generate();
  });

  el.btnGenerate.addEventListener("click", generate);
  el.btnExportCsv.addEventListener("click", exportCSV);


  // ✅ Click sur bouton "Sem." (event delegation) -> ouvre vue_semaine.html
el.resultTable.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-weekbtn='1']");
  if (!btn) return;

  const monthKey = btn.getAttribute("data-mkey");
  const monthLabel = btn.getAttribute("data-mlabel");

  // on passe tout en querystring (copy/paste multi-entités)
  const qs = new URLSearchParams({
    entity: ENTITY_KEY,
    month: monthKey,
    monthLabel: monthLabel || "",
    realFile: REAL_XLSX_FILE,
    dateCol: REAL_DATE_COL,
    // 👇 on réutilise tes keys localStorage déjà existantes dans la page
    budgetKey: STORAGE.budget,
    overrideKey: STORAGE.realOverride
  });

  window.location.href = `${WEEK_VIEW_PAGE}?${qs.toString()}`;
});

  // ---------------------------
  // CORE: month columns
  // ---------------------------
  function generate(){
    if (!budgetData?.clients?.length){
      el.resultTable.innerHTML = emptyTable("Aucune donnée Budget PSA en localStorage.");
      setKpis(0,0,0,0);
      lastExportRows = [];
      return;
    }

    const selectedMonths = MONTHS.filter(m => filters.MOIS.has(m.label));
    if (!selectedMonths.length){
      el.resultTable.innerHTML = emptyTable("Aucun mois sélectionné.");
      setKpis(0,0,0,0);
      lastExportRows = [];
      return;
    }

    const clients = budgetData.clients.filter(c=>{
      const name = c.name || "";
      const nc = String(c.nclient || "").trim();
      const okClient = filters.CLIENT.size ? filters.CLIENT.has(name) : false;
      const okNc = (values.NCLIENT.length === 0) ? true : (filters.NCLIENT.size ? filters.NCLIENT.has(nc) : false);
      return okClient && okNc;
    });

    const rows = clients.map(c=>{
      const per = {};
      let cumReal=0, cumBudget=0;

      for (const m of selectedMonths){
        const b = toInt(c?.budget?.[m.key]);
        const r = getRealForClientMonth(c, m.key);
        const e = r - b;
        per[m.key] = { real:r, budget:b, ecart:e };
        cumReal += r; cumBudget += b;
      }

      return {
        name: c.name || "",
        nclient: String(c.nclient || "").trim(),
        per,
        cum: { real:cumReal, budget:cumBudget, ecart:(cumReal-cumBudget) }
      };
    });

    const global = { per:{}, cum:{ real:0, budget:0, ecart:0 } };
    for (const m of selectedMonths){
      let sr=0,sb=0;
      for (const r of rows){ sr += r.per[m.key].real; sb += r.per[m.key].budget; }
      global.per[m.key] = { real:sr, budget:sb, ecart:(sr-sb) };
      global.cum.real += sr;
      global.cum.budget += sb;
    }
    global.cum.ecart = global.cum.real - global.cum.budget;

    setKpis(rows.length, global.cum.real, global.cum.budget, global.cum.ecart);

    const thead = `
      <thead>
        <tr>
          <th class="col-client">Client</th>
          <th class="col-nclient">N CLIENT</th>
${selectedMonths.map((m,idx)=>`
  <th class="${idx===0 ? "mStart" : ""}" colspan="3">
    ${escapeHtml(m.label)}
    <button class="wkBtn" type="button" data-weekbtn="1" data-mkey="${m.key}" data-mlabel="${escapeAttr(m.label)}" title="Vue semaine">
      <span class="ic">↗</span><span class="tx">Sem.</span>
    </button>
  </th>
`).join("")}
          <th class="mStart" colspan="3">Cumul</th>
        </tr>
        <tr>
          <th class="col-client">—</th>
          <th class="col-nclient">—</th>
          ${selectedMonths.map((m,idx)=>`
            <th class="${idx===0 ? "mStart" : ""}">Réel</th>
            <th class="subSep">Budget</th>
            <th class="subSep">Écart</th>
          `).join("")}
          <th class="mStart">Réel</th>
          <th class="subSep">Budget</th>
          <th class="subSep">Écart</th>
        </tr>
      </thead>
    `;

    const rowGlobal = `
      <tr class="rowTotal">
        <td class="col-client">Cumul</td>
        <td class="col-nclient">—</td>
        ${selectedMonths.map((m,idx)=>{
          const v = global.per[m.key];
          return `
            <td class="num ${idx===0 ? "mStart" : ""}">${fmt(v.real)}</td>
            <td class="num subSep">${fmt(v.budget)}</td>
            <td class="num subSep ${ecartClass(v.ecart)}">${fmt(v.ecart)}</td>
          `;
        }).join("")}
        <td class="num mStart">${fmt(global.cum.real)}</td>
        <td class="num subSep">${fmt(global.cum.budget)}</td>
        <td class="num subSep ${ecartClass(global.cum.ecart)}">${fmt(global.cum.ecart)}</td>
      </tr>
    `;

    const body = rows.map(r=>{
      return `
        <tr>
          <td class="col-client">${escapeHtml(r.name)}</td>
          <td class="col-nclient">${escapeHtml(r.nclient || "—")}</td>
          ${selectedMonths.map((m,idx)=>{
            const v = r.per[m.key];
            return `
              <td class="num ${idx===0 ? "mStart" : ""}">${fmt(v.real)}</td>
              <td class="num subSep">${fmt(v.budget)}</td>
              <td class="num subSep ${ecartClass(v.ecart)}">${fmt(v.ecart)}</td>
            `;
          }).join("")}
          <td class="num mStart">${fmt(r.cum.real)}</td>
          <td class="num subSep">${fmt(r.cum.budget)}</td>
          <td class="num subSep ${ecartClass(r.cum.ecart)}">${fmt(r.cum.ecart)}</td>
        </tr>
      `;
    }).join("");

    el.resultTable.innerHTML = thead + `<tbody>${rowGlobal}${body}</tbody>`;
    lastExportRows = buildExportRows(selectedMonths, rows, global);
  }

  function buildExportRows(selectedMonths, rows, global){
    const out = [];
    const cr = { CLIENT:"Cumul", "N CLIENT":"" };
    for (const m of selectedMonths){
      const v = global.per[m.key];
      cr[`${m.label} Réel`] = v.real;
      cr[`${m.label} Budget`] = v.budget;
      cr[`${m.label} Écart`] = v.ecart;
    }
    cr["Cumul Réel"] = global.cum.real;
    cr["Cumul Budget"] = global.cum.budget;
    cr["Cumul Écart"] = global.cum.ecart;
    out.push(cr);

    for (const r of rows){
      const rr = { CLIENT:r.name, "N CLIENT":r.nclient };
      for (const m of selectedMonths){
        const v = r.per[m.key];
        rr[`${m.label} Réel`] = v.real;
        rr[`${m.label} Budget`] = v.budget;
        rr[`${m.label} Écart`] = v.ecart;
      }
      rr["Cumul Réel"] = r.cum.real;
      rr["Cumul Budget"] = r.cum.budget;
      rr["Cumul Écart"] = r.cum.ecart;
      out.push(rr);
    }
    return out;
  }

  // ---------------------------
  // FILTER UI
  // ---------------------------
  function buildFiltersUI(){
    el.filtersGrid.innerHTML = dimensions.map(d => `
      <div class="fcol" data-dim="${escapeAttr(d.key)}">
        <div class="fhead">
          <div class="ftitle">${escapeHtml(d.label)}</div>
          <div class="pill" id="count_${escapeAttr(d.key)}">—</div>
          <div class="btnStack">
            <button class="btnSm" data-act="all" data-dim="${escapeAttr(d.key)}">Tout</button>
            <button class="btnSm" data-act="none" data-dim="${escapeAttr(d.key)}">Aucun</button>
          </div>
        </div>

        <input class="search" placeholder="Rechercher…" data-search="${escapeAttr(d.key)}" />

        <div class="list" id="list_${escapeAttr(d.key)}"></div>

        <div class="ffoot">
          <div>Sel : <span id="sel_${escapeAttr(d.key)}">—</span></div>
          <div>Total : <span id="tot_${escapeAttr(d.key)}">—</span></div>
        </div>
      </div>
    `).join("");

    el.filtersGrid.querySelectorAll("button[data-act]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const dim = btn.getAttribute("data-dim");
        const act = btn.getAttribute("data-act");
        if (!dim) return;
        const allVals = values[dim] || [];
        filters[dim] = (act === "all") ? new Set(allVals) : new Set();
        renderList(dim);
      });
    });

    el.filtersGrid.querySelectorAll("input[data-search]").forEach(inp=>{
      inp.addEventListener("input", ()=>{
        const dim = inp.getAttribute("data-search");
        searches[dim] = (inp.value || "").trim().toLowerCase();
        renderList(dim);
      });
    });
  }

  function renderAllLists(){
    for (const d of dimensions) renderList(d.key);
  }

  function renderList(dim){
    const list = document.getElementById(`list_${dim}`);
    const totEl = document.getElementById(`tot_${dim}`);
    const selEl = document.getElementById(`sel_${dim}`);
    const countEl = document.getElementById(`count_${dim}`);
    if (!list) return;

    const allVals = values[dim] || [];
    const q = (searches[dim] || "");
    const shown = q ? allVals.filter(v=>String(v).toLowerCase().includes(q)) : allVals;
    const sel = filters[dim] || new Set();

    countEl.textContent = String(shown.length);
    totEl.textContent = String(allVals.length);
    selEl.textContent = String(sel.size);

    list.innerHTML = shown.map(v=>{
      const on = sel.has(v);
      return `
        <div class="item ${on ? "on" : ""}" data-dim="${escapeAttr(dim)}" data-val="${escapeAttr(v)}">
          <div class="l">${escapeHtml(v)}</div>
          <div class="r">${on ? "✓" : ""}</div>
        </div>
      `;
    }).join("");

    list.querySelectorAll(".item[data-dim][data-val]").forEach(it=>{
      it.addEventListener("click", ()=>{
        const d = it.getAttribute("data-dim");
        const v = it.getAttribute("data-val");
        if (!d) return;
        if (!filters[d]) filters[d] = new Set();
        if (filters[d].has(v)) filters[d].delete(v);
        else filters[d].add(v);
        renderList(d);
      });
    });
  }

  // ---------------------------
  // EXPORT
  // ---------------------------
  function exportCSV(){
    if (!lastExportRows.length){ alert("Rien à exporter."); return; }
    const headers = Object.keys(lastExportRows[0]);
    const lines = [headers.join(";")];

    for (const r of lastExportRows){
      const row = headers.map(h=>{
        const v = r[h];
        if (typeof v === "number") return String(v);
        return String(v ?? "").replace(/;/g, ",");
      }).join(";");
      lines.push(row);
    }

    downloadBlob(new Blob([lines.join("\n")], {type:"text/csv;charset=utf-8"}), `requete_psa_${stamp()}.csv`);
  }

  // ---------------------------
  // REAL READER: override > activite
  // ---------------------------
  function getRealForClientMonth(bc, mk){
    const ov = override?.[bc.id]?.[mk];
    if (ov !== undefined && ov !== null) return toInt(ov);
    const src = (bc.nclient && actByNClient.get(normKey(bc.nclient))) || actByName.get(normKey(bc.name));
    return toInt(src?.months?.[mk]);
  }

  // ---------------------------
  // STATUS / KPIs / HELPERS
  // ---------------------------
  function paintStatus(){
    const bOk = !!(budgetData?.clients?.length);
    const rOk = !!(activite?.clients?.length);

    el.dotBudget.className = "dot " + (bOk ? "ok" : "bad");
    el.sBudget.textContent = bOk ? `${budgetData.clients.length} clients` : "introuvable";

    el.dotReel.className = "dot " + (rOk ? "ok" : "warn");
    el.sReel.textContent = rOk ? `${activite.clients.length} clients` : "non trouvé";
  }

  function setKpis(clientsCount, real, budget, ecart){
    el.kClients.textContent = String(clientsCount);
    el.kReal.textContent = fmt(real);
    el.kBudget2.textContent = fmt(budget);
    el.kEcart.textContent = fmt(ecart);
  }

  function emptyTable(msg){
    return `
      <thead><tr><th class="col-client">Info</th></tr></thead>
      <tbody><tr><td class="col-client" style="color:rgba(255,255,255,0.70);font-weight:600;">${escapeHtml(msg)}</td></tr></tbody>
    `;
  }

  function ecartClass(v){
    const n = toInt(v);
    if (n > 0) return "ecart pos";
    if (n < 0) return "ecart neg";
    return "ecart zero";
  }

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      if (!raw) return fallback;
      return JSON.parse(raw);
    }catch{ return fallback; }
  }

  function toNumber(v){
    if (v === null || v === undefined) return 0;
    if (typeof v === "number") return isFinite(v) ? v : 0;
    const s = String(v).trim();
    if (!s) return 0;
    const norm = s.replace(/\s/g,"").replace(",",".");
    const n = Number(norm);
    return isFinite(n) ? n : 0;
  }
  function toInt(v){ return Math.round(toNumber(v)); }
  function fmt(v){ return nf0.format(toInt(v)); }

  function normKey(s){
    return String(s || "")
      .trim()
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/\s+/g," ");
  }

  function stamp(){
    const d = new Date();
    const pad = (x)=>String(x).padStart(2,"0");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
  }

  function downloadBlob(blob, filename){
    const a = document.createElement("a");
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }

  function escapeHtml(str){
    return String(str ?? "").replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[s]));
  }
  function escapeAttr(str){
    return escapeHtml(str).replace(/"/g, "&quot;");
  }
})();
</script>
</body>
