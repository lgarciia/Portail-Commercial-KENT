<!doctype html>
<html lang="fr" data-theme="dark">
<head>
  <link rel="icon" type="image/svg+xml" href="./kent-logo.svg">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vue semaine</title>
  <script src="./shared-ui.js"></script>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg:#0b0f17;
      --panel:rgba(255,255,255,0.06);
      --stroke:rgba(255,255,255,0.10);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.62);
      --good:rgba(95,255,160,0.92);
      --bad:rgba(255,110,110,0.92);
      --warn:rgba(255,199,97,0.92);
      --shadow:0 16px 40px rgba(0,0,0,0.35);
      --r:18px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--font);
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(90,140,255,0.15), transparent 60%),
        radial-gradient(1100px 800px at 110% 20%, rgba(255,120,200,0.10), transparent 55%),
        radial-gradient(900px 700px at 60% 110%, rgba(130,255,200,0.08), transparent 55%),
        var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .app{height:100%;display:flex;flex-direction:column}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 18px;
      border-bottom:1px solid var(--stroke);
      background: linear-gradient(to bottom, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:38px;height:38px;border-radius:14px;
      background: linear-gradient(135deg, rgba(132,182,255,0.95), rgba(120,255,195,0.55));
      box-shadow: 0 10px 22px rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.15);
    }
    .titleWrap{display:flex;flex-direction:column;line-height:1.15}
    .title{font-weight:900;font-size:16px}
    .subtitle{font-size:13px;color:var(--muted);margin-top:2px}

    .btn{
      height:38px;padding:0 16px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.90);
      font-weight:900;cursor:pointer;transition:.12s;
    }
    .btn:hover{background:rgba(255,255,255,0.10);transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn.primary{background:rgba(132,182,255,0.18);border-color:rgba(132,182,255,0.28)}

    .shell{
      height: calc(100% - 67px);
      padding:16px 16px 18px;
      display:grid;
      grid-template-rows: auto 1fr;
      gap:12px;
      min-height:0;
    }
    .card{
      border:1px solid var(--stroke);
      background: linear-gradient(to bottom, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      border-radius:var(--r);
      box-shadow:var(--shadow);
      backdrop-filter: blur(12px);
      overflow:hidden;
      min-height:0;
    }
    .status{
      padding:12px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
      border-bottom:1px solid var(--stroke);
      background:rgba(0,0,0,0.14);
    }
    .chip{
      display:inline-flex;align-items:center;gap:10px;height:38px;padding:0 14px;border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      font-size:13px;color:rgba(255,255,255,0.70);
    }
    .chip b{color:rgba(255,255,255,0.92)}
    .dot{width:9px;height:9px;border-radius:999px;background:rgba(255,255,255,0.28)}
    .dot.ok{background:var(--good)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    .tableWrap{flex:1;min-height:0;overflow:auto;background:rgba(0,0,0,0.10)}
    table{border-collapse:separate;border-spacing:0;width:100%;min-width:980px;font-size:12px}
    thead th{
      position:sticky;top:0;z-index:3;
      background:rgba(10,15,23,0.92);backdrop-filter: blur(8px);
      border-bottom:1px solid rgba(255,255,255,0.10);
      font-weight:900;color:rgba(255,255,255,0.84);
      padding:10px 10px;
      text-align:right;
    }
    thead th:first-child, tbody td:first-child{ text-align:left; }
    th,td{
      padding:10px 10px;border-bottom:1px solid rgba(255,255,255,0.08);
      border-right:1px solid rgba(255,255,255,0.08);
      white-space:nowrap;
      font-variant-numeric:tabular-nums;
      vertical-align:middle;
    }
    td.num{ text-align:right; font-weight:900; }
    .pos{ color:var(--good); }
    .neg{ color:var(--bad); }
    .zero{ color:rgba(255,255,255,0.60); }
    .rowTotal td{
      background: rgba(132,182,255,0.10);
      border-bottom: 1px solid rgba(132,182,255,0.20);
      font-weight:950;
    }

    /* ✅ colonne commentaire */
    .cmt{
      width:100%;
      min-width:320px;
      height:34px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.22);
      color: var(--text);
      padding:0 10px;
      outline:none;
      font-weight:800;
      font-size:12px;
    }
    .cmt:focus{
      border-color: rgba(132,182,255,0.35);
      box-shadow: 0 0 0 4px rgba(132,182,255,0.10);
    }
  </style>
  <link rel="stylesheet" href="./shared-theme.css">
</head>

<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div class="titleWrap">
        <div class="title" id="tTitle">Vue semaine</div>
        <div class="subtitle" id="tSub">—</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
      <button class="btn" id="btnBack">← Retour</button>
      <button class="btn primary" id="btnReload">Recharger</button>
    </div>
  </div>

  <div class="shell">
    <div class="card">
      <div class="status">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
          <div class="chip"><span class="dot" id="dotBudget"></span>Budget (fetch) : <b id="sBudget">—</b></div>
          <div class="chip"><span class="dot" id="dotReel"></span>Réel (fetch) : <b id="sReel">—</b></div>
          <div class="chip">Mois : <b id="sMonth">—</b></div>
          <div class="chip">Budget semaine = <b id="sBw">—</b></div>
        </div>
        <div class="chip" id="debugLine" style="max-width:100%;overflow:hidden;text-overflow:ellipsis;">—</div>
      </div>

      <div class="tableWrap">
        <table id="weekTable"></table>
      </div>
    </div>
  </div>
</div>

<script>
(async function(){
  // ============================
  // QUERY PARAMS (COPY/PASTE)
  // ============================
  const qs = new URLSearchParams(location.search);

  const entity     = qs.get("entity") || "ENTITY";
  const year       = Number(qs.get("year") || new Date().getFullYear());
  const monthKey   = (qs.get("month") || "jan").toLowerCase();
  const monthLabel = qs.get("monthLabel") || monthKey;

  const realFile   = qs.get("realFile") || "";
  const dateColStr = qs.get("dateCol") || "Date vente";
  const budgetFile = qs.get("budgetFile") || "";

  const el = {
    tTitle: document.getElementById("tTitle"),
    tSub: document.getElementById("tSub"),
    sMonth: document.getElementById("sMonth"),
    dotBudget: document.getElementById("dotBudget"),
    dotReel: document.getElementById("dotReel"),
    sBudget: document.getElementById("sBudget"),
    sReel: document.getElementById("sReel"),
    sBw: document.getElementById("sBw"),
    debugLine: document.getElementById("debugLine"),
    table: document.getElementById("weekTable"),
    btnBack: document.getElementById("btnBack"),
    btnReload: document.getElementById("btnReload"),
  };

  const nf0 = new Intl.NumberFormat("fr-FR", { maximumFractionDigits:0 });

  el.tTitle.textContent = `Vue semaine — ${entity}`;
  el.tSub.textContent = `Réel: ${realFile || "?"} • Budget: ${budgetFile || "?"} • Date: "${dateColStr}"`;
  el.sMonth.textContent = `${monthLabel} ${year}`;

  // ✅ commentaires : clé stable (entité + année + mois)
  const COMMENT_KEY = `WEEK_VIEW_COMMENTS_${slug(entity)}_${year}_${monthKey}`;

  el.btnBack.addEventListener("click", () => history.back());
  el.btnReload.addEventListener("click", () => run());

  await run();

  async function run(){
    // init
    setDot(el.dotBudget, "warn");
    setDot(el.dotReel, "warn");
    el.sBudget.textContent = "chargement…";
    el.sReel.textContent = "chargement…";
    el.sBw.textContent = "—";
    el.debugLine.textContent = "—";

    // 1) fetch budget month total
    let budgetMonth = 0;
    try{
      if (!budgetFile) throw new Error("budgetFile manquant");
      budgetMonth = await fetchBudgetMonthTotal(budgetFile, monthLabel);
      setDot(el.dotBudget, "ok");
      el.sBudget.textContent = nf0.format(Math.round(budgetMonth));
    }catch(err){
      console.error(err);
      setDot(el.dotBudget, "bad");
      el.sBudget.textContent = "erreur";
    }

    // budget / 4 (4 semaines fixes)
    const budgetWeek = budgetMonth / 4;
    el.sBw.textContent = nf0.format(Math.round(budgetWeek));

    // 2) fetch real weekly totals
    let wReal = [0,0,0,0];
    let usedLines = 0;
    let dbg = "";

    try{
      if (!realFile) throw new Error("realFile manquant");

      const rows = await fetchXlsxRows(realFile);
      const headerMap = buildHeaderMap(rows[0] || {});

      const colDate = findCol(headerMap, [dateColStr, "date vente", "date"]);
      const colAmt  = findCol(headerMap, [
        "ca total",
        "montant prix achat kent",
        "montant",
        "ca",
        "chiffre d'affaire",
        "chiffre affaire"
      ]);

      if (!colAmt) throw new Error("colonne montant introuvable");
      if (!colDate) throw new Error(`colonne date introuvable (attendu "${dateColStr}")`);

      for (const r of rows){
        const dt = parseAnyDate_FR(r[colDate]); // ✅ DD/MM/YYYY
        if (!dt) continue;
        if (dt.getFullYear() !== year) continue;
        if (monthFromDate(dt) !== monthKey) continue;

        const amt = toNumber(r[colAmt]);
        if (!amt) continue;

        const wi = weekBucket(dt); // 0..3
        wReal[wi] += amt;
        usedLines++;
      }

      dbg = `Réel OK • lignes retenues: ${usedLines} • colDate="${colDate}" • colAmt="${colAmt}"`;
      setDot(el.dotReel, "ok");
      el.sReel.textContent = nf0.format(Math.round(wReal.reduce((a,b)=>a+b,0)));
    }catch(err){
      console.error(err);
      dbg = `Réel KO • ${String(err.message || err)}`;
      setDot(el.dotReel, "bad");
      el.sReel.textContent = "erreur";
    }

    el.debugLine.textContent = dbg;

    // 3) render + commentaires
    renderTable(wReal, budgetWeek);
    bindComments();
  }

  function renderTable(wReal, budgetWeek){
    const wBudget = [budgetWeek, budgetWeek, budgetWeek, budgetWeek];
    const wEcart = wReal.map((r,i)=> r - wBudget[i]);

    const cumReal = wReal.reduce((a,b)=>a+b,0);
    const cumBudget = wBudget.reduce((a,b)=>a+b,0);
    const cumEcart = cumReal - cumBudget;

    const cmts = loadComments();

    el.table.innerHTML = `
      <thead>
        <tr>
          <th>Semaine</th>
          <th>Réel</th>
          <th>Budget</th>
          <th>Écart</th>
          <th style="text-align:left">Commentaire</th>
        </tr>
      </thead>
      <tbody>
        ${[0,1,2,3].map(i => `
          <tr>
            <td>Semaine ${i+1}</td>
            <td class="num">${fmt(wReal[i])}</td>
            <td class="num">${fmt(wBudget[i])}</td>
            <td class="num ${ecartClass(wEcart[i])}">${fmt(wEcart[i])}</td>
            <td style="text-align:left">
              <input class="cmt" data-cmt="w${i+1}" placeholder="Note semaine ${i+1}…" value="${escAttr(cmts[`w${i+1}`] || "")}">
            </td>
          </tr>
        `).join("")}
        <tr class="rowTotal">
          <td>Cumul</td>
          <td class="num">${fmt(cumReal)}</td>
          <td class="num">${fmt(cumBudget)}</td>
          <td class="num ${ecartClass(cumEcart)}">${fmt(cumEcart)}</td>
          <td style="text-align:left">
            <input class="cmt" data-cmt="cum" placeholder="Note cumul…" value="${escAttr(cmts.cum || "")}">
          </td>
        </tr>
      </tbody>
    `;

    function fmt(v){ return nf0.format(Math.round(Number(v)||0)); }
  }

  function bindComments(){
    const inputs = el.table.querySelectorAll("input[data-cmt]");
    inputs.forEach(inp => {
      inp.addEventListener("input", () => {
        const key = inp.getAttribute("data-cmt");
        const data = loadComments();
        data[key] = inp.value || "";
        saveComments(data);
      });
    });
  }

  function loadComments(){
    try{
      const raw = localStorage.getItem(COMMENT_KEY);
      return raw ? JSON.parse(raw) : {};
    }catch{ return {}; }
  }
  function saveComments(obj){
    try{ localStorage.setItem(COMMENT_KEY, JSON.stringify(obj || {})); }catch{}
  }

  // ============================
  // FETCH XLSX (GitHub safe + PK check)
  // ============================
  async function fetchXlsxRows(file){
    const url = file + (file.includes("?") ? "&" : "?") + "v=" + Date.now();
    const res = await fetch(url, { cache:"no-store" });
    const buf = await res.arrayBuffer();
    if (!res.ok) throw new Error("HTTP " + res.status);

    const u8 = new Uint8Array(buf);
    if (!(u8[0] === 0x50 && u8[1] === 0x4B)) throw new Error("pas un XLSX (PK manquant)");

    const wb = XLSX.read(buf, { type:"array" });
    const sheet = pickBestSheet(wb);
    const ws = wb.Sheets[sheet];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
    if (!rows.length) throw new Error("xlsx vide");
    return rows;
  }

  // ============================
  // BUDGET fetch : somme de la colonne du mois
  // ============================
  async function fetchBudgetMonthTotal(budgetFile, monthLabelFR){
    const rows = await fetchXlsxRows(budgetFile);
    const headerMap = buildHeaderMap(rows[0] || {});
    const colMonth = findCol(headerMap, [monthLabelFR]);
    if (!colMonth) throw new Error(`colonne budget mois introuvable: "${monthLabelFR}"`);

    let sum = 0;
    for (const r of rows) sum += toNumber(r[colMonth]);
    return sum;
  }

  // ============================
  // DATE parsing : ✅ DD/MM/YYYY prioritaire
  // ============================
  function parseAnyDate_FR(v){
    if (!v && v !== 0) return null;

    if (v instanceof Date && !isNaN(v.getTime())) return v;

    // Excel serial
    if (typeof v === "number" && isFinite(v)){
      const d = XLSX.SSF.parse_date_code(v);
      if (!d) return null;
      const dt = new Date(d.y, (d.m||1)-1, d.d||1);
      return isNaN(dt.getTime()) ? null : dt;
    }

    const s = String(v).trim();
    if (!s) return null;

    // ✅ dd/mm/yyyy (ou dd-mm-yyyy / dd.mm.yyyy)
    const m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);
    if (m){
      const dd = Number(m[1]);
      const mm = Number(m[2]);
      const yy = Number(m[3]);
      const yyyy = yy < 100 ? (2000 + yy) : yy;
      const dt = new Date(yyyy, mm-1, dd);
      return isNaN(dt.getTime()) ? null : dt;
    }

    const t = Date.parse(s);
    return isNaN(t) ? null : new Date(t);
  }

  // 4 semaines fixes : 1..7 / 8..14 / 15..21 / 22..fin
  function weekBucket(date){
    const d = date.getDate();
    if (d <= 7) return 0;
    if (d <= 14) return 1;
    if (d <= 21) return 2;
    return 3;
  }

  function monthFromDate(date){
    const keys = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
    return keys[date.getMonth()] || "jan";
  }

  // ============================
  // XLSX helpers
  // ============================
  function pickBestSheet(wb){
    let best = wb.SheetNames[0];
    let bestScore = -1;
    for (const name of wb.SheetNames){
      const ws = wb.Sheets[name];
      const ref = ws && ws["!ref"];
      if (!ref) continue;
      const range = XLSX.utils.decode_range(ref);
      const rows = (range.e.r - range.s.r + 1);
      const cols = (range.e.c - range.s.c + 1);
      const score = rows * cols;
      if (score > bestScore){
        bestScore = score;
        best = name;
      }
    }
    return best;
  }

  function buildHeaderMap(sampleRow){
    const map = {};
    for (const k of Object.keys(sampleRow || {})){
      map[normKey(k)] = k;
    }
    return map;
  }

  function findCol(headerMap, candidates){
    for (const c of candidates){
      const nk = normKey(c);
      if (headerMap[nk]) return headerMap[nk];
    }
    return null;
  }

  function normKey(s){
    return String(s || "")
      .trim()
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/\s+/g," ");
  }

  function toNumber(v){
    if (v === null || v === undefined) return 0;
    if (typeof v === "number") return isFinite(v) ? v : 0;
    const s = String(v).trim();
    if (!s) return 0;
    const n = Number(s.replace(/\s/g,"").replace(",","."));
    return isFinite(n) ? n : 0;
  }

  function ecartClass(v){
    const n = Math.round(Number(v)||0);
    if (n > 0) return "pos";
    if (n < 0) return "neg";
    return "zero";
  }

  function setDot(dotEl, type){
    dotEl.className = "dot " + (type === "ok" ? "ok" : type === "bad" ? "bad" : "warn");
  }

  function escAttr(str){
    return String(str ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  }

  function slug(str){
    return String(str || "")
      .trim()
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[^a-z0-9]+/g,"-")
      .replace(/(^-|-$)/g,"");
  }

})();
</script>
</body>
</html>
