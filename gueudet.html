<script>
(function(){
  try{
    const t = localStorage.getItem("APP_THEME") || "dark";
    document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
  }catch(e){
    document.documentElement.setAttribute("data-theme","dark");
  }
})();
</script>

<style>
:root{
  --bg:#0b0f17;
  --stroke:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.6);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(900px 600px at 20% -10%, rgba(90,140,255,0.15), transparent 60%),
    radial-gradient(900px 600px at 100% 20%, rgba(255,120,200,0.10), transparent 55%),
    var(--bg);
  color:var(--text);
}
.navbar{
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 18px;
  border-bottom:1px solid var(--stroke);
  background:rgba(255,255,255,0.05);
}
.brand{display:flex;align-items:center;gap:12px;}
.hubSquare{
  width:42px;height:42px;border-radius:16px;
  background:linear-gradient(135deg,#7c3aed,#22c55e);
  cursor:pointer;
}
.titleWrap{cursor:pointer;}
.titleWrap b{font-size:14px;font-weight:1000;}
.titleWrap span{font-size:12px;color:var(--muted);}
.navBtns{display:flex;gap:10px;}
.btn{
  height:38px;padding:0 16px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:var(--text);
  font-weight:900;font-size:13px;
  display:flex;align-items:center;text-decoration:none;
}
.btn.primary{
  background:linear-gradient(135deg,#7fb3ff55,#ff7ad955);
}

.center{
  height:calc(100vh - 64px);
  display:flex;align-items:center;justify-content:center;
}
.card{
  width:min(1200px,100%);
  text-align:center;
}
.imageCard{
  width:min(1050px,100%);
  height:420px;
  margin:auto;
  display:flex;align-items:center;justify-content:center;
}
.imageCard img{
  width:100%;height:100%;
  object-fit:contain;
}
.title{font-size:30px;font-weight:1000;margin-top:20px;}
.subtitle{color:var(--muted);}
</style>
  <link rel="stylesheet" href="./shared-theme.css">
</head>
<body>

<div class="navbar">
  <div class="brand">
    <div class="hubSquare" id="goHub"></div>
    <div class="titleWrap" id="goHub2">
      <b>Espace Gueudet</b>
      <span>Accès rapide aux outils Gueudet</span>
    </div>
  </div>
  <div class="navBtns">
    <a class="btn primary" href="client-gueudet.html">Outil Lookup</a>
    <a class="btn" href="explorer-gueudet.html">Recherche Produit</a>
  </div>
</div>

<div class="center">
  <div class="card">
    <div class="imageCard">
      <img src="accgueudet.png" alt="Espace Gueudet">
    </div>
    <h1 class="title">Espace Gueudet</h1>
   
  </div>
</div>

<script>
const go=()=>window.location.href="index.html";
goHub.onclick=go; goHub2.onclick=go;
</script>
