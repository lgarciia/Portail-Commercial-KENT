<!doctype html>
<html lang="fr" data-theme="dark">
<head>
<link rel="icon" type="image/svg+xml" href="./kent-logo.svg">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Espace PSA</title>
  <script src="./shared-ui.js"></script>

<script>
(function(){
  try{
    const t = localStorage.getItem("APP_THEME") || "dark";
    document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
  }catch(e){
    document.documentElement.setAttribute("data-theme","dark");
  }
})();
</script>

<style>
:root{
  --bg:#0b0f17;
  --panel:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.6);
  --shadow:0 18px 45px rgba(0,0,0,0.35);
}
html[data-theme="light"]{
  --bg:#f6f7fb;
  --panel:rgba(0,0,0,0.045);
  --stroke:rgba(0,0,0,0.10);
  --text:rgba(10,14,22,0.92);
  --muted:rgba(10,14,22,0.58);
  --shadow:0 18px 45px rgba(10,14,22,0.16);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,Roboto,sans-serif;
  background:
    radial-gradient(900px 600px at 20% -10%, rgba(90,140,255,0.15), transparent 60%),
    radial-gradient(900px 600px at 100% 20%, rgba(255,120,200,0.10), transparent 55%),
    var(--bg);
  color:var(--text);
}

/* ===== NAVBAR ===== */
.navbar{
  min-height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 18px;
  border-bottom:1px solid var(--stroke);
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.hubSquare{
  width:42px;height:42px;border-radius:16px;
  background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(34,197,94,.70));
  box-shadow: 0 14px 32px rgba(124,58,237,.22);
  border:1px solid rgba(255,255,255,0.10);
  cursor:pointer;
  transition:.15s;
}
.hubSquare:hover{ transform:translateY(-1px); }

.titleWrap{
  display:flex;
  flex-direction:column;
  cursor:pointer;
}
.titleWrap b{
  font-weight:1000;
  font-size:14px;
}
.titleWrap span{
  font-size:12px;
  color:var(--muted);
}

.navBtns{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.btn{
  height:38px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:var(--text);
  font-weight:900;
  font-size:13px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  text-decoration:none;
  transition:.15s;
}
.btn:hover{ background:rgba(255,255,255,0.12); transform:translateY(-1px); }
.btn.primary{
  background:linear-gradient(135deg,#7fb3ff55,#ff7ad955);
  border-color:#7fb3ff66;
}

/* ===== CENTER ===== */
.center{
  height:calc(100vh - 64px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* ===== CARD ===== */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:28px;
  box-shadow:var(--shadow);
  width:min(1200px, 100%);
  text-align:center;
}
html[data-theme="light"] .card{
  background: rgba(255,255,255,0.65);
  border-color: rgba(10,14,22,0.10);
}

/* ===== IMAGE GRANDE ===== */
.imageCard{
  margin:0 auto 20px;
  width:min(1050px, 100%);
  height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:22px;
  overflow:hidden;
  border:none;           /* ✅ supprimé */
  box-shadow:none;       /* ✅ supprimé */
  background:transparent;/* ✅ plus de fond */
}
.imageCard img{
  width:100%;
  height:100%;
  object-fit:contain;   /* ✅ IMAGE ENTIÈRE */
  object-position:center;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.45));
}

/* ===== TEXT ===== */
.title{
  font-size:30px;
  font-weight:1000;
  margin:0 0 8px;
}
.subtitle{
  margin:0;
  color:var(--muted);
  font-size:14px;
}

/* ===== RESPONSIVE ===== */
@media (max-width:820px){
  .imageCard{ height:300px; }
}
@media (max-width:520px){
  .imageCard{ height:220px; }
  .navbar{ padding:10px 12px; }
  .btn{ padding:0 12px; }
}
</style>
</head>

<body>

<div class="navbar">
  <div class="brand">
    <div class="hubSquare" id="goHub"></div>
    <div class="titleWrap" id="goHub2">
      <b>Espace PSA</b>
      <span>Accès rapide aux outils PSA</span>
    </div>
  </div>

  <div class="navBtns">
    <a class="btn primary" href="client-psa.html">Outil Lookup</a>
    <a class="btn" href="explorer-psa.html">Recherche Produit</a>
  </div>
</div>

<div class="center">
  <div class="card">

    <div class="imageCard">
      <img src="accpsa.png" alt="Espace PSA">
    </div>

    <h1 class="title">Espace PSA</h1>
    <p class="subtitle">Accède au lookup client et à la recherche produit PSA.</p>

  </div>
</div>

<script>
(function(){
  const HUB="index.html";
  const go=()=>window.location.href=HUB;
  document.getElementById("goHub").addEventListener("click",go);
  document.getElementById("goHub2").addEventListener("click",go);
})();
</script>

</body>
</html>
